<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SharpOpenGL — Space RTS</title>
    <base href="/SharpOpenGl/" />
    <link href="css/app.css" rel="stylesheet" />
    <link href="css/demo-video.css" rel="stylesheet" />
</head>
<body>
    <div id="app">
        <div class="loading">Loading SharpOpenGL…</div>
    </div>

    <button id="demo-toggle" type="button" aria-label="Watch gameplay demo">▶ Watch gameplay demo</button>
    <div id="demo-overlay" role="dialog" aria-label="Gameplay demo video">
        <div id="demo-panel">
            <h2>Gameplay demo — fleet, combat, and base building</h2>
            <video id="gameplay-demo"
                   controls
                   playsinline
                   preload="metadata"
                   poster="gameplay-demo-poster.png">
                <source src="gameplay-demo.mp4" type="video/mp4" />
                Your browser does not support HTML5 video.
            </video>
            <button id="demo-close" type="button">Close</button>
        </div>
    </div>

    <script src="js/demo-video.js"></script>
    <script src="js/ui-canvas.js"></script>
    <script src="js/webgl-renderer.js"></script>
    <script src="js/game-loop.js"></script>
    <script src="js/game-input.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>
</html>
