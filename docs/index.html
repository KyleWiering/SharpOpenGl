<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SharpOpenGL — Space RTS Preview</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        #glcanvas {
            display: block;
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
        }

        /* ── Resource bar ── */
        #resource-bar {
            position: absolute;
            top: 0; left: 0; right: 0;
            display: flex;
            align-items: center;
            gap: 24px;
            padding: 6px 16px;
            background: rgba(0, 0, 0, 0.75);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            font-size: 13px;
            pointer-events: none;
            z-index: 10;
        }
        #resource-bar .title {
            font-weight: bold;
            color: #4fc3f7;
            font-size: 14px;
            margin-right: 8px;
            white-space: nowrap;
        }
        .res { display: flex; align-items: center; gap: 5px; white-space: nowrap; }
        .res .icon { font-size: 15px; }
        .res .label { color: #aaa; font-size: 11px; }
        .res .val { font-weight: bold; font-family: monospace; min-width: 46px; }
        .res-energy   .val { color: #ffd600; }
        .res-minerals .val { color: #00e5ff; }
        .res-data     .val { color: #e040fb; }
        .res-crew     .val { color: #69f0ae; }
        #game-time { margin-left: auto; color: #aaa; font-size: 12px; font-family: monospace; }

        /* ── Controls overlay ── */
        #controls {
            position: absolute;
            top: 44px;
            left: 10px;
            background: rgba(0, 0, 0, 0.65);
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 12px;
            line-height: 1.75;
            pointer-events: none;
            border: 1px solid rgba(255,255,255,0.08);
            z-index: 10;
        }
        #controls h3 { color: #4fc3f7; font-size: 13px; margin-bottom: 4px; }
        .key {
            display: inline-block;
            background: rgba(255,255,255,0.15);
            padding: 0 5px;
            border-radius: 3px;
            font-family: monospace;
            font-size: 11px;
        }
        /* Hide keyboard hints on touch-primary devices, show touch hints */
        .hint-keyboard { display: inline; }
        .hint-touch    { display: none; }
        @media (pointer: coarse) {
            .hint-keyboard { display: none; }
            .hint-touch    { display: inline; }
        }

        /* ── Unit info panel ── */
        #unit-info {
            position: absolute;
            bottom: 10px;
            left: 10px;
            min-width: 200px;
            background: rgba(0, 0, 0, 0.75);
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 12px;
            line-height: 1.65;
            border: 1px solid rgba(255,255,255,0.08);
            z-index: 10;
            display: none;
        }
        #unit-info h4 { color: #4fc3f7; margin-bottom: 4px; }
        #unit-info .hp-bar-wrap { background: rgba(255,255,255,0.1); height: 6px; border-radius: 3px; margin: 4px 0; }
        #unit-info .hp-bar { height: 6px; border-radius: 3px; background: #4caf50; transition: width 0.3s; }

        /* ── Minimap ── */
        #minimap {
            position: absolute;
            bottom: 10px;
            right: 10px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 4px;
            z-index: 10;
            background: #020208;
        }

        /* ── FPS ── */
        #fps {
            position: absolute;
            top: 44px;
            right: 10px;
            background: rgba(0, 0, 0, 0.65);
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-family: monospace;
            border: 1px solid rgba(255,255,255,0.08);
            z-index: 10;
        }

        /* ── Notification ── */
        #notif {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 15px;
            pointer-events: none;
            z-index: 20;
            display: none;
            border: 1px solid rgba(79,195,247,0.5);
            color: #4fc3f7;
        }

        /* ── Gameplay demo (mobile-friendly) ── */
        #demo-section {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: min(960px, calc(100% - 20px));
            z-index: 25;
            background: rgba(0, 0, 0, 0.82);
            border: 1px solid rgba(79, 195, 247, 0.35);
            border-radius: 8px;
            padding: 10px 12px;
        }
        #demo-section h2 {
            color: #4fc3f7;
            font-size: 14px;
            margin-bottom: 8px;
        }
        #demo-section video {
            width: 100%;
            max-height: 42vh;
            border-radius: 6px;
            background: #000;
        }
        @media (max-width: 768px) {
            body { overflow: auto; height: auto; min-height: 100vh; }
            #glcanvas { position: relative; height: 55vh; }
            #demo-section { position: relative; transform: none; left: auto; margin: 10px; width: auto; }
        }
    </style>
</head>
<body>
    <canvas id="glcanvas"></canvas>

    <div id="resource-bar">
        <span class="title">⚔ Space RTS — Sector Alpha</span>
        <div class="res res-energy">
            <span class="icon">⚡</span>
            <span class="label">Plasma Cores</span>
            <span class="val" id="val-energy">500</span>
        </div>
        <div class="res res-minerals">
            <span class="icon">⛏</span>
            <span class="label">Astrium Ore</span>
            <span class="val" id="val-minerals">300</span>
        </div>
        <div class="res res-data">
            <span class="icon">💾</span>
            <span class="label">Quantum Frags</span>
            <span class="val" id="val-data">0</span>
        </div>
        <div class="res res-crew">
            <span class="icon">👤</span>
            <span class="label">Personnel</span>
            <span class="val" id="val-crew">10</span>
        </div>
        <span id="game-time">T+0:00</span>
    </div>

    <div id="controls">
        <h3>Controls</h3>
        <div class="hint-keyboard"><span class="key">W</span><span class="key">A</span><span class="key">S</span><span class="key">D</span> / Arrows — Pan</div>
        <div class="hint-keyboard"><span class="key">Scroll</span> — Zoom</div>
        <div class="hint-keyboard"><span class="key">Click</span> — Select unit</div>
        <div class="hint-touch">Drag — Pan</div>
        <div class="hint-touch">Pinch — Zoom</div>
        <div class="hint-touch">Tap — Select unit</div>
    </div>

    <div id="unit-info">
        <h4 id="ui-name">—</h4>
        <div id="ui-type" style="color:#aaa;font-size:11px;"></div>
        <div class="hp-bar-wrap"><div class="hp-bar" id="ui-hp-bar" style="width:100%"></div></div>
        <div id="ui-hp-text" style="font-size:11px;color:#ccc;"></div>
        <div id="ui-extra" style="margin-top:4px;font-size:11px;color:#aaa;"></div>
    </div>

    <canvas id="minimap" width="160" height="160"></canvas>

    <div id="fps">FPS: --</div>
    <div id="notif"></div>

    <section id="demo-section" aria-label="Gameplay demo video">
        <h2>Gameplay demo — selection, movement, combat, base building</h2>
        <video controls playsinline preload="metadata" poster="gameplay-demo-poster.png">
            <source src="gameplay-demo.mp4" type="video/mp4" />
            Your browser does not support HTML5 video.
        </video>
    </section>

    <script src="engine.js"></script>
</body>
</html>
