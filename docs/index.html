<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SharpOpenGL Engine - WebGL Demo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            height: 100vh;
        }
        #canvas-container {
            position: relative;
            width: 100%;
            height: 100vh;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        #overlay {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
            line-height: 1.6;
            pointer-events: none;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        #overlay h2 {
            font-size: 16px;
            margin-bottom: 6px;
            color: #4fc3f7;
        }
        #overlay .key { 
            display: inline-block;
            background: rgba(255,255,255,0.15);
            padding: 1px 6px;
            border-radius: 3px;
            font-family: monospace;
            font-size: 12px;
        }
        #fps {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 13px;
            font-family: monospace;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>
    <div id="canvas-container">
        <canvas id="glcanvas"></canvas>
        <div id="overlay">
            <h2>SharpOpenGL Engine</h2>
            <div><span class="key">W</span>/<span class="key">S</span> Move forward/back</div>
            <div><span class="key">Q</span>/<span class="key">E</span> Strafe left/right</div>
            <div><span class="key">Z</span>/<span class="key">X</span> Move up/down</div>
            <div><span class="key">A</span>/<span class="key">D</span> Rotate left/right</div>
            <div style="margin-top:6px; color:#aaa; font-size:11px;">Click canvas to capture input</div>
        </div>
        <div id="fps">FPS: --</div>
    </div>
    <script src="engine.js"></script>
</body>
</html>
