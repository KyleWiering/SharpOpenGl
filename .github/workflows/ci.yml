name: CI — Test, Build & Package

on:
  push:
    branches: [ main, master, 'copilot/**' ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  # ── Tests ─────────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build (Debug)
        run: dotnet build --configuration Debug --no-restore

      - name: Run tests
        run: dotnet test --configuration Debug --no-build --verbosity normal

  # ── Desktop builds ────────────────────────────────────────────────────────
  build-desktop:
    name: Desktop Builds
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    strategy:
      matrix:
        include:
          - rid: win-x64
            name: Windows x64
          - rid: linux-x64
            name: Linux x64
          - rid: osx-x64
            name: macOS x64
          - rid: osx-arm64
            name: macOS ARM64

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Publish (${{ matrix.name }})
        run: |
          dotnet publish SharpOpenGl/SharpOpenGl.csproj \
            --configuration Release \
            --runtime ${{ matrix.rid }} \
            --self-contained true \
            --output dist/${{ matrix.rid }} \
            /p:PublishSingleFile=true

      - name: Upload artifact (${{ matrix.name }})
        uses: actions/upload-artifact@v5
        with:
          name: SharpOpenGl-${{ matrix.rid }}
          path: dist/${{ matrix.rid }}
          retention-days: 30

  # ── Browser (Blazor WASM) build ───────────────────────────────────────────
  build-browser:
    name: Browser WASM Build
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Publish Blazor WASM
        run: |
          dotnet publish SharpOpenGl.Browser/SharpOpenGl.Browser.csproj \
            --configuration Release \
            --output dist/browser \
            /p:BaseHref=/SharpOpenGl/

      - name: Upload browser artifact
        uses: actions/upload-artifact@v5
        with:
          name: SharpOpenGl-Browser
          path: dist/browser
          retention-days: 30

  # ── Release ─────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-desktop, build-browser]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Package artifacts into zips
        run: |
          mkdir -p release
          for dir in artifacts/SharpOpenGl-*; do
            name=$(basename "$dir")
            (cd "$dir" && zip -r "../../release/${name}.zip" .)
          done

      - name: Generate version tag
        id: version
        run: |
          VERSION="v1.0.0-build.${GITHUB_RUN_NUMBER}"
          echo "tag=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Generated version: ${VERSION}"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "SharpOpenGl ${{ steps.version.outputs.tag }}"
          body: |
            Automated release from CI build #${{ github.run_number }}.

            **Commit:** ${{ github.sha }}
            **Branch:** ${{ github.ref_name }}

            ## Downloads
            - **Windows x64** — `SharpOpenGl-win-x64.zip`
            - **Linux x64** — `SharpOpenGl-linux-x64.zip`
            - **macOS x64** — `SharpOpenGl-osx-x64.zip`
            - **macOS ARM64** — `SharpOpenGl-osx-arm64.zip`
            - **Browser (WASM)** — `SharpOpenGl-Browser.zip`
          files: release/*.zip
          generate_release_notes: true