name: Deploy to GitHub Pages

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Configure Pages for GitHub Actions deployment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/${{ github.repository }}/pages" \
            --method PUT \
            --input - <<'EOF'
          {"build_type":"workflow"}
          EOF

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install Mesa, OpenGL, and ffmpeg dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y mesa-utils libgl1-mesa-dev libglu1-mesa-dev xvfb libopengl0 libglfw3 ffmpeg

      - name: Restore dependencies
        run: dotnet restore

      - name: Build desktop project for demo capture
        run: dotnet build SharpOpenGl/SharpOpenGl.csproj --configuration Release --no-restore

      - name: Record gameplay demo video
        run: |
          xvfb-run -a -s "-screen 0 1024x768x24" \
            dotnet run --project SharpOpenGl --configuration Release --no-build -- \
            --demo-recording --mission example_scenario

      - name: Publish Blazor WASM to docs/
        run: |
          mkdir -p _md_backup _demo_backup
          cp docs/*.md _md_backup/ 2>/dev/null || true
          cp docs/gameplay-demo.mp4 docs/gameplay-demo-poster.png _demo_backup/ 2>/dev/null || true
          dotnet publish SharpOpenGl.Browser/SharpOpenGl.Browser.csproj \
            --configuration Release \
            --output docs \
            /p:BaseHref=/SharpOpenGl/
          cp _md_backup/*.md docs/ 2>/dev/null || true
          cp _demo_backup/gameplay-demo.mp4 _demo_backup/gameplay-demo-poster.png docs/ 2>/dev/null || true
          rm -f docs/engine.js docs/engine.min.js
          touch docs/.nojekyll
          cp docs/index.html docs/404.html

      - name: Verify Pages artifact
        run: |
          test -f docs/index.html || (echo "❌ docs/index.html missing after publish" && exit 1)
          test -f docs/_framework/blazor.webassembly.js || (echo "❌ Blazor _framework assets missing" && exit 1)
          echo "✅ Pages artifact ready ($(du -sh docs | cut -f1))"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: 'docs'
          include-hidden-files: true

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4