name: Deploy to GitHub Pages

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Restore dependencies
        run: dotnet restore

      # Publish Blazor BEFORE any desktop Release build — desktop build corrupts
      # incremental WASM publish output (CI build-browser publishes in isolation).
      - name: Publish Blazor WASM
        run: |
          set -euo pipefail
          rm -rf dist/pages
          dotnet publish SharpOpenGl.Browser/SharpOpenGl.Browser.csproj \
            --configuration Release \
            --no-restore \
            --output dist/pages \
            /p:BaseHref=/SharpOpenGl/
          if [ ! -f dist/pages/index.html ]; then
            echo "❌ dist/pages/index.html missing after publish"
            ls -la dist/pages || true
            exit 1
          fi
          if [ ! -f dist/pages/_framework/blazor.boot.json ]; then
            echo "❌ dist/pages/_framework/blazor.boot.json missing"
            ls -la dist/pages/_framework 2>/dev/null || true
            exit 1
          fi
          echo "✅ Blazor WASM published ($(du -sh dist/pages | cut -f1))"

      - name: Install Mesa, OpenGL, and ffmpeg dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y mesa-utils libgl1-mesa-dev libglu1-mesa-dev xvfb libopengl0 libglfw3 ffmpeg

      - name: Build desktop project for demo capture
        run: dotnet build SharpOpenGl/SharpOpenGl.csproj --configuration Release --no-restore

      - name: Record gameplay demo video
        run: |
          xvfb-run -a -s "-screen 0 1024x768x24" \
            dotnet run --project SharpOpenGl --configuration Release --no-build -- \
            --demo-recording --mission example_scenario

      - name: Assemble GitHub Pages site
        run: |
          set -euo pipefail
          rm -rf pages_site
          mkdir -p pages_site
          cp -a dist/pages/. pages_site/
          cp docs/*.md pages_site/ 2>/dev/null || true
          if [ -f docs/gameplay-demo.mp4 ]; then cp docs/gameplay-demo.mp4 pages_site/; fi
          if [ -f docs/gameplay-demo-poster.png ]; then cp docs/gameplay-demo-poster.png pages_site/; fi
          rm -f pages_site/engine.js pages_site/engine.min.js
          touch pages_site/.nojekyll
          cp pages_site/index.html pages_site/404.html
          if [ ! -f pages_site/_framework/blazor.boot.json ]; then
            echo "❌ pages_site/_framework/blazor.boot.json missing after assemble"
            ls -la pages_site || true
            exit 1
          fi
          echo "✅ Pages artifact ready ($(du -sh pages_site | cut -f1))"

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./pages_site
          force_orphan: true

      - name: Point Pages at gh-pages branch
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/${{ github.repository }}/pages" \
            --method PUT \
            --input - <<'EOF'
          {"build_type":"legacy","source":{"branch":"gh-pages","path":"/"}}
          EOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: 'pages_site'
          include-hidden-files: true

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4