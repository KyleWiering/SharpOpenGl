name: Deploy to GitHub Pages

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install Mesa, OpenGL, and ffmpeg dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y mesa-utils libgl1-mesa-dev libglu1-mesa-dev xvfb libopengl0 libglfw3 ffmpeg

      - name: Restore dependencies
        run: dotnet restore

      - name: Build desktop project for demo capture
        run: dotnet build SharpOpenGl/SharpOpenGl.csproj --configuration Release --no-restore

      - name: Record gameplay demo video
        run: |
          xvfb-run -a -s "-screen 0 1024x768x24" \
            dotnet run --project SharpOpenGl --configuration Release --no-build -- \
            --demo-recording --mission example_scenario

      - name: Publish Blazor WASM to docs/
        run: |
          set -euo pipefail
          mkdir -p _md_backup _demo_backup
          cp docs/*.md _md_backup/ 2>/dev/null || true
          if [ -f docs/gameplay-demo.mp4 ]; then cp docs/gameplay-demo.mp4 _demo_backup/; fi
          if [ -f docs/gameplay-demo-poster.png ]; then cp docs/gameplay-demo-poster.png _demo_backup/; fi
          dotnet publish SharpOpenGl.Browser/SharpOpenGl.Browser.csproj \
            --configuration Release \
            --output docs \
            /p:BaseHref=/SharpOpenGl/
          cp _md_backup/*.md docs/ 2>/dev/null || true
          if [ -f _demo_backup/gameplay-demo.mp4 ]; then cp _demo_backup/gameplay-demo.mp4 docs/; fi
          if [ -f _demo_backup/gameplay-demo-poster.png ]; then cp _demo_backup/gameplay-demo-poster.png docs/; fi
          rm -f docs/engine.js docs/engine.min.js
          touch docs/.nojekyll

      - name: Verify Pages artifact
        run: |
          set -euo pipefail
          test -f docs/index.html || (echo "❌ docs/index.html missing after publish" && exit 1)
          test -f docs/_framework/blazor.webassembly.js || (echo "❌ Blazor _framework assets missing" && exit 1)
          cp docs/index.html docs/404.html
          echo "✅ Pages artifact ready ($(du -sh docs | cut -f1))"

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          force_orphan: true

      - name: Point Pages at gh-pages branch
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/${{ github.repository }}/pages" \
            --method PUT \
            --input - <<'EOF'
          {"build_type":"legacy","source":{"branch":"gh-pages","path":"/"}}
          EOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: 'docs'
          include-hidden-files: true

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4